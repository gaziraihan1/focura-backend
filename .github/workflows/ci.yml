name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: focura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ✅ Ensure DB is REALLY ready
      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            nc -z localhost 5432 && echo "Postgres ready" && exit 0
            echo "Waiting for Postgres..."
            sleep 2
          done
          exit 1

      # ✅ Ensure Redis ready
      - name: Wait for Redis
        run: |
          for i in {1..20}; do
            nc -z localhost 6379 && echo "Redis ready" && exit 0
            echo "Waiting for Redis..."
            sleep 2
          done
          exit 1

      - name: Write .env.test
        run: |
          cat > .env.test << 'EOF'
          NODE_ENV=test
          PORT=5001

          TEST_DATABASE_URL=postgresql://postgres:test_password@localhost:5432/focura_test
          DATABASE_URL=postgresql://postgres:test_password@localhost:5432/focura_test
          DIRECT_URL=postgresql://postgres:test_password@localhost:5432/focura_test

          JWT_PRIVATE_KEY_PATH=./keys/private.pem
          JWT_PUBLIC_KEY_PATH=./keys/public.pem

          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}

          REDIS_URL=redis://127.0.0.1:6379

          STRIPE_SECRET_KEY=sk_test_fake_for_tests_only
          STRIPE_WEBHOOK_SECRET=whsec_fake_for_tests_only
          STRIPE_PRICE_PRO_MONTHLY=price_fake_pro_monthly
          STRIPE_PRICE_PRO_YEARLY=price_fake_pro_yearly
          STRIPE_PRICE_BUSINESS_MONTHLY=price_fake_business_monthly
          STRIPE_PRICE_BUSINESS_YEARLY=price_fake_business_yearly

          CLOUDINARY_CLOUD_NAME=test
          CLOUDINARY_API_KEY=test
          CLOUDINARY_API_SECRET=test

          CLIENT_URL=http://localhost:3000
          FRONTEND_URL=http://localhost:3000

          PAYMENT_PROVIDER=STRIPE

          FOCURA_ADMIN_IDS=cmnie0eka0000h50qi8aqsreo

          ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }}
          EOF

      - name: Generate RSA keys
        run: |
          mkdir -p keys
          openssl genrsa -out keys/private.pem 2048
          openssl rsa -in keys/private.pem -pubout -out keys/public.pem

      - name: Verify keys
        run: |
          test -f keys/private.pem || exit 1
          test -f keys/public.pem || exit 1

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Reset Redis
        run: redis-cli FLUSHALL

      - name: Run tests
        run: npx vitest run --reporter=verbose

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            test-results/