name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: focura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      PORT: 5001

      DATABASE_URL: postgresql://postgres:test_password@localhost:5432/focura_test
      DIRECT_URL: postgresql://postgres:test_password@localhost:5432/focura_test

      REDIS_URL: redis://localhost:6379

      JWT_PRIVATE_KEY_PATH: ./keys/private.pem
      JWT_PUBLIC_KEY_PATH: ./keys/public.pem

      NEXTAUTH_SECRET: {{ secrets.NEXTAUTH_SECRET }}

      STRIPE_SECRET_KEY: sk_test_fake_for_tests_only
      STRIPE_WEBHOOK_SECRET: whsec_fake_for_tests_only
      STRIPE_PRICE_PRO_MONTHLY: price_fake_pro_monthly
      STRIPE_PRICE_PRO_YEARLY: price_fake_pro_yearly
      STRIPE_PRICE_BUSINESS_MONTHLY: price_fake_business_monthly
      STRIPE_PRICE_BUSINESS_YEARLY: price_fake_business_yearly

      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: test
      CLOUDINARY_API_SECRET: test

      CLIENT_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:3000

      PAYMENT_PROVIDER: STRIPE

      FOCURA_ADMIN_IDS: cmnie0eka0000h50qi8aqsreo

      ACCESS_TOKEN_SECRET: {{ secrets.ACCESS_TOKEN_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate JWT keys for CI
        run: |
          mkdir -p keys
          openssl genrsa -out keys/private.pem 2048
          openssl rsa -in keys/private.pem -pubout -out keys/public.pem

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            nc -z localhost 5432 && echo "DB ready" && break
            echo "Waiting for DB..."
            sleep 2
          done

      - name: Run Prisma generate
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Run tests (serial mode for stability)
        run: npm test -- --runInBand --detectOpenHandles --forceExit
